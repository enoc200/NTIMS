services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims_password
      POSTGRES_DB: ims
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d ims"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ims:ims_password@db:5432/ims
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-this-secret-before-production
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push && npm run start"

  seed:
    build:
      context: .
    profiles:
      - seed
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ims:ims_password@db:5432/ims
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-this-secret-before-production
    command: sh -c "npx prisma db push && npx ts-node --transpile-only --compiler-options '{\"module\":\"CommonJS\",\"moduleResolution\":\"node\"}' prisma/seed.ts"
    restart: "no"

volumes:
  postgres-data:
